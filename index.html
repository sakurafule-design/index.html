<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四元素気質診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F7F4EF;
  --ink: #1C1917;
  --ink-light: #57534E;
  --ink-faint: #A8A29E;
  --accent: #7C6A5A;
  --accent-light: #E8E0D8;
  --water: #4A7B9D;
  --water-light: #E8F2F8;
  --earth: #6B7C4A;
  --earth-light: #EDF2E6;
  --wind: #8B6FAE;
  --wind-light: #F1EDF8;
  --fire: #C4622D;
  --fire-light: #FAF0EB;
  --border: #DDD8D0;
  --radius: 4px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.8;
}
.screen { display: none; }
.screen.active { display: block; }

/* ── INTRO ── */
#intro {
  min-height: 100vh;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px;
  text-align: center;
}
#intro.active { display: flex; }
.intro-eyebrow {
  font-family: 'Noto Serif JP', serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--accent);
  margin-bottom: 32px;
}
.intro-title {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(26px, 5vw, 44px);
  font-weight: 300;
  line-height: 1.4;
  margin-bottom: 24px;
}
.intro-title span {
  display: block;
  font-size: 0.55em;
  color: var(--accent);
  letter-spacing: 0.05em;
  margin-top: 8px;
}
.intro-desc {
  max-width: 520px;
  color: var(--ink-light);
  font-size: 14px;
  line-height: 1.9;
  margin-bottom: 48px;
}
.scale-guide {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 28px;
  margin-bottom: 48px;
  max-width: 480px;
  width: 100%;
}
.scale-guide p {
  font-size: 12px;
  color: var(--ink-light);
  margin-bottom: 12px;
  font-weight: 500;
}
.scale-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.scale-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--ink-light);
}
.scale-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent-light);
  color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500;
  flex-shrink: 0;
}
.btn-start {
  background: var(--ink);
  color: var(--cream);
  border: none;
  padding: 16px 48px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  letter-spacing: 0.1em;
  cursor: pointer;
  border-radius: var(--radius);
  transition: background 0.2s, transform 0.1s;
}
.btn-start:hover { background: var(--accent); transform: translateY(-1px); }

/* ── QUIZ ── */
#quiz {
  min-height: 100vh;
  display: none;
  flex-direction: column;
}
#quiz.active { display: flex; }
.quiz-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  background: white;
  position: sticky;
  top: 0;
  z-index: 10;
}
.quiz-logo {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.1em;
  white-space: nowrap;
}
.progress-bar-wrap {
  flex: 1;
  height: 3px;
  background: var(--accent-light);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-label {
  font-size: 12px;
  color: var(--ink-faint);
  white-space: nowrap;
}
.quiz-body {
  flex: 1;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
  padding: 48px 24px 40px;
}
.group-label {
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 32px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.question-block {
  margin-bottom: 40px;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.question-num {
  font-size: 11px;
  color: var(--ink-faint);
  margin-bottom: 8px;
}
.question-text {
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--ink);
  margin-bottom: 16px;
}
.options {
  display: flex;
  gap: 6px;
}
.opt-btn {
  flex: 1;
  padding: 10px 4px;
  border: 1px solid var(--border);
  background: white;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.opt-btn .opt-num {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
}
.opt-btn .opt-label {
  font-size: 10px;
  color: var(--ink-faint);
  text-align: center;
  line-height: 1.3;
}
.opt-btn:hover {
  border-color: var(--accent);
  background: var(--accent-light);
}
.opt-btn.selected {
  border-color: var(--accent);
  background: var(--accent);
}
.opt-btn.selected .opt-num,
.opt-btn.selected .opt-label { color: white; }

.quiz-footer {
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
  padding: 0 24px 48px;
  display: flex;
  justify-content: flex-end;
}
.btn-next {
  background: var(--ink);
  color: var(--cream);
  border: none;
  padding: 14px 36px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  letter-spacing: 0.08em;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all 0.2s;
  opacity: 0.4;
  pointer-events: none;
}
.btn-next.ready { opacity: 1; pointer-events: auto; }
.btn-next.ready:hover { background: var(--accent); }

/* ── RESULT ── */
#result {
  min-height: 100vh;
  display: none;
  flex-direction: column;
  align-items: center;
}
#result.active { display: flex; }
.result-hero {
  width: 100%;
  padding: 64px 24px 48px;
  text-align: center;
}
.result-eyebrow {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--ink-faint);
  margin-bottom: 20px;
}
.result-type-name {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(32px, 7vw, 56px);
  font-weight: 300;
  line-height: 1.3;
  margin-bottom: 12px;
}
.result-type-sub {
  font-size: 13px;
  color: var(--ink-faint);
  letter-spacing: 0.08em;
  margin-bottom: 24px;
}
.sub-type-label {
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 8px;
}

.result-body {
  max-width: 680px;
  width: 100%;
  padding: 0 24px 80px;
}
.result-section {
  margin-bottom: 48px;
  padding-bottom: 48px;
  border-bottom: 1px solid var(--border);
}
.result-section:last-child { border-bottom: none; }
.result-section-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 20px;
}
.result-section-body {
  color: var(--ink-light);
  font-size: 15px;
  line-height: 1.9;
}
.result-section-body p { margin-bottom: 16px; }
.result-section-body p:last-child { margin-bottom: 0; }
.result-question {
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  color: var(--ink);
  line-height: 1.8;
  padding: 20px 24px;
  border-left: 2px solid;
  margin-top: 24px;
}
.score-bar-section {
  margin-bottom: 48px;
  padding-bottom: 48px;
  border-bottom: 1px solid var(--border);
}
.score-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.score-type-name {
  font-size: 13px;
  color: var(--ink);
  width: 72px;
  flex-shrink: 0;
}
.score-bar-wrap {
  flex: 1;
  height: 8px;
  background: var(--accent-light);
  border-radius: 4px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s ease;
}
.score-val {
  font-size: 12px;
  color: var(--ink-faint);
  width: 40px;
  text-align: right;
  flex-shrink: 0;
}

.btn-retry {
  display: block;
  margin: 0 auto;
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 12px 32px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all 0.2s;
  letter-spacing: 0.08em;
}
.btn-retry:hover { background: var(--accent); color: white; }
</style>
</head>
<body>

<!-- INTRO -->
<section id="intro" class="screen active">
  <p class="intro-eyebrow">Element Type Diagnosis</p>
  <h1 class="intro-title">
    四元素気質診断
    <span>あなたの感じ方のタイプを知る</span>
  </h1>
  <p class="intro-desc">
    28の質問に答えてください。あなたがどんな感じ方をする人か、何に動かされやすいか——あなたの特性をお伝えします。<br><br>
    深く考えすぎず、最初に浮かんだ感覚で選んでください。
  </p>
  <div class="scale-guide">
    <p>回答の基準</p>
    <div class="scale-row">
      <div class="scale-item"><span class="scale-num">1</span>まったく当てはまらない</div>
      <div class="scale-item"><span class="scale-num">2</span>あまり当てはまらない</div>
      <div class="scale-item"><span class="scale-num">3</span>どちらともいえない</div>
      <div class="scale-item"><span class="scale-num">4</span>やや当てはまる</div>
      <div class="scale-item"><span class="scale-num">5</span>非常によく当てはまる</div>
    </div>
  </div>
  <button class="btn-start" onclick="startQuiz()">診断をはじめる</button>
</section>

<!-- QUIZ -->
<section id="quiz" class="screen">
  <header class="quiz-header">
    <span class="quiz-logo">四元素気質診断</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
    <span class="progress-label" id="progressLabel">0 / 28</span>
  </header>
  <div class="quiz-body" id="quizBody"></div>
  <div class="quiz-footer">
    <button class="btn-next" id="btnNext" onclick="nextGroup()">次へ</button>
  </div>
</section>

<!-- RESULT -->
<section id="result" class="screen">
  <div class="result-hero" id="resultHero">
    <p class="result-eyebrow">あなたの診断結果</p>
    <div class="result-type-name" id="resTypeName"></div>
    <div class="result-type-sub" id="resTypeSub"></div>
    <div class="sub-type-label" id="resSubType"></div>
  </div>
  <div class="result-body">
    <div class="score-bar-section">
      <p class="result-section-label">タイプ別スコア</p>
      <div id="scoreBars"></div>
    </div>
    <div class="result-section">
      <p class="result-section-label">あなたの特性</p>
      <div class="result-section-body" id="resMainBody"></div>
      <div class="result-question" id="resQuestion"></div>
    </div>
    <div class="result-section" id="resSubSection">
      <p class="result-section-label">あわせ持つ特性</p>
      <div class="result-section-body" id="resSubBody"></div>
    </div>
    <button class="btn-retry" onclick="retry()">もう一度診断する</button>
  </div>
</section>

<script>
const TYPES = {
  水: {
    name: '共感型',
    sub: '水の気質',
    color: '#4A7B9D',
    colorLight: '#E8F2F8',
    hero: '#E8F2F8',
    body: `<p>あなたは、人の感情や場の空気を、言葉にされる前から感じ取ってしまうことが多い人です。相手が何を感じているか、何を求めているかが、自然と伝わってくる。その感受性の深さは、人と深くつながる力であり、同時に疲れやすさの原因にもなっています。</p><p>日常では、誰かが落ち込んでいると自分まで重くなったり、映画や本の感情をしばらく引きずったりという形で現れます。カウンセリング、ケア、支援など、人の感情に寄り添うことが求められる場面で力を発揮しやすいタイプです。ただし、自分と相手の感情を分ける練習が、長く続けるための鍵になります。</p>`,
    question: 'あなたの「感じる力」が、自然に活きていたのは、どんな場面でしたか？'
  },
  土: {
    name: '洞察型',
    sub: '土の気質',
    color: '#6B7C4A',
    colorLight: '#EDF2E6',
    hero: '#EDF2E6',
    body: `<p>あなたは、物事の表面より奥にあるものに目が向く人です。人の言葉の背景、出来事の原因、関係の構造——見えていないものを丁寧に読み解くことが、自然とできます。納得できるまで調べ、じっくり深めることを厭わない。その粘り強さと深さが、あなたの大きな特性です。</p><p>日常では、気になったことをとことん調べずにいられなかったり、一つのことを長く丁寧に続けていたりする形で現れます。分析、研究、教育、相談支援など、深く考えることや一人ひとりに丁寧に向き合うことが求められる場面で力を発揮しやすいタイプです。</p>`,
    question: 'あなたの「深く見る力」は、これまでどんな場面で誰かの役に立ちましたか？'
  },
  風: {
    name: '調和型',
    sub: '風の気質',
    color: '#8B6FAE',
    colorLight: '#F1EDF8',
    hero: '#F1EDF8',
    body: `<p>あなたは、場の流れや人と人の関係を、頭と直感で自然に読んでいる人です。誰が何を言いたいのか、場がどう動いているのかが、感情より先に情報として入ってくる。その認識の速さと整理する力が、あなたの大きな特性です。</p><p>日常では、話を聞きながら自然と整理していたり、対立している場面で双方の言いたいことが見えてきたりする形で現れます。ファシリテーション、コーディネート、コミュニケーションが求められる場面で力を発揮しやすいタイプです。ただし、場に合わせすぎて自分の感覚を後回しにしやすい面もあります。</p>`,
    question: 'あなたが「場の流れを読んで動いた」とき、その場はどう変わりましたか？'
  },
  火: {
    name: '推進型',
    sub: '火の気質',
    color: '#C4622D',
    colorLight: '#FAF0EB',
    hero: '#FAF0EB',
    body: `<p>あなたは、やると決めたら動く人です。熱量があり、やりたいことへの衝動が強く、その場のエネルギーを引き上げることが自然にできます。不公平や理不尽に対して黙っていられない正義感も、この特性から来ています。</p><p>日常では、気づいたら先頭に立っていたり、周りが迷っているときに最初に動き出していたりする形で現れます。プロジェクトの立ち上げ、研修や講座の運営など、エネルギーと推進力が必要な場面で力を発揮しやすいタイプです。ただし、動きすぎて燃え尽きやすい傾向もあるため、自分のペースを知ることが重要です。</p>`,
    question: 'あなたの「動く力」が、誰かや何かを動かした瞬間はどんなときでしたか？'
  }
};

const QUESTIONS = [
  { type:'水', q:'悲しんでいる人の話を聞くと、自分まで悲しくなってくる' },
  { type:'水', q:'映画や本の登場人物に感情移入すると、終わった後もしばらくその気持ちが残る' },
  { type:'水', q:'誰かとぶつかったり、関係がギクシャクすると、そのことが頭から離れにくい' },
  { type:'水', q:'相手が怒っていたり落ち込んでいたりすると、自分も同じような気持ちになってくる' },
  { type:'水', q:'頼まれると断れず、引き受けてから後悔することがある' },
  { type:'水', q:'空想や妄想が広がりやすく、気づくと別のことを考えていることがある' },
  { type:'水', q:'誰かに深くわかってもらえたと感じると、それだけで気持ちが満たされる' },
  { type:'土', q:'気になったことは、納得できるまで調べずにいられない' },
  { type:'土', q:'物事の表面より、その背景や原因の方が気になる' },
  { type:'土', q:'一つのことをじっくり深めることが、あれこれ手を出すより性に合っている' },
  { type:'土', q:'十分に理解できていないと、なかなか次の行動に移れない' },
  { type:'土', q:'美しいものや丁寧に作られたものを見ると、感情が大きく動くことがある' },
  { type:'土', q:'積み重ねてきたものや、長く続けてきたものに、強い愛着がある' },
  { type:'土', q:'散らかった状況や曖昧なままの物事が、気になって落ち着かない' },
  { type:'風', q:'話を聞きながら、この人は何を言いたいのかを自然と整理していることがある' },
  { type:'風', q:'意見が対立している場面で、双方の言いたいことが自然と見えてくる' },
  { type:'風', q:'無駄な手順や回りくどいやり方が気になって、もっと効率よくできると思うことがある' },
  { type:'風', q:'言葉にする前に、なんとなくわかるという感覚で動いていることがある' },
  { type:'風', q:'場が沈んでいたり、誰かが孤立していたりすると、自然と動いてしまう' },
  { type:'風', q:'情報や知識を集めて、頭の中で整理するのが好きだ' },
  { type:'風', q:'人と話すとき、言葉そのものより、声のトーンや間の取り方の方が気になることがある' },
  { type:'火', q:'やると決めたら、細かいことより先に動いてしまう方だ' },
  { type:'火', q:'不公平な場面や理不尽なことを見ると、黙っていられなくなる' },
  { type:'火', q:'やりたいことへの衝動が強く、気づくと動き出していることがある' },
  { type:'火', q:'熱中すると周りが見えなくなるくらい集中してしまうことがある' },
  { type:'火', q:'頑張りすぎて、あとからどっと疲れが出ることが多い' },
  { type:'火', q:'自分が正しいと思ったことは、周りに反対されても曲げにくい' },
  { type:'火', q:'誰かを助けたい、役に立ちたいという気持ちが強く、気づくと先頭に立っていることがある' },
];

const GROUPS = [
  { label:'質問 1〜7', indices:[0,1,2,3,4,5,6] },
  { label:'質問 8〜14', indices:[7,8,9,10,11,12,13] },
  { label:'質問 15〜21', indices:[14,15,16,17,18,19,20] },
  { label:'質問 22〜28', indices:[21,22,23,24,25,26,27] },
];

let answers = new Array(28).fill(0);
let currentGroup = 0;
const OPT_LABELS = ['まったく\n当てはまらない','あまり\n当てはまらない','どちらとも\nいえない','やや\n当てはまる','非常によく\n当てはまる'];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  currentGroup = 0;
  answers = new Array(28).fill(0);
  renderGroup();
  showScreen('quiz');
}

function renderGroup() {
  const g = GROUPS[currentGroup];
  const answered = answers.filter(a => a > 0).length;
  document.getElementById('progressBar').style.width = (answered / 28 * 100) + '%';
  document.getElementById('progressLabel').textContent = answered + ' / 28';

  let html = `<p class="group-label">${g.label}</p>`;
  g.indices.forEach(i => {
    html += `<div class="question-block">
      <p class="question-num">Q${i+1}</p>
      <p class="question-text">${QUESTIONS[i].q}</p>
      <div class="options">`;
    for(let v=1;v<=5;v++){
      const sel = answers[i] === v ? 'selected' : '';
      html += `<button class="opt-btn ${sel}" onclick="selectAnswer(${i},${v},this)">
        <span class="opt-num">${v}</span>
        <span class="opt-label">${OPT_LABELS[v-1]}</span>
      </button>`;
    }
    html += `</div></div>`;
  });

  document.getElementById('quizBody').innerHTML = html;
  checkNext();
  window.scrollTo(0,0);
}

function selectAnswer(idx, val, el) {
  answers[idx] = val;
  el.closest('.options').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  const answered = answers.filter(a => a > 0).length;
  document.getElementById('progressBar').style.width = (answered / 28 * 100) + '%';
  document.getElementById('progressLabel').textContent = answered + ' / 28';
  checkNext();
}

function checkNext() {
  const g = GROUPS[currentGroup];
  const allAnswered = g.indices.every(i => answers[i] > 0);
  const btn = document.getElementById('btnNext');
  btn.classList.toggle('ready', allAnswered);
  btn.textContent = currentGroup < GROUPS.length - 1 ? '次へ' : '結果を見る';
}

function nextGroup() {
  if(currentGroup < GROUPS.length - 1) {
    currentGroup++;
    renderGroup();
  } else {
    showResult();
  }
}

function showResult() {
  const scores = { 水:0, 土:0, 風:0, 火:0 };
  QUESTIONS.forEach((q, i) => { scores[q.type] += answers[i]; });

  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const [mainKey, mainScore] = sorted[0];
  const [subKey] = sorted[1];

  const main = TYPES[mainKey];
  const sub = TYPES[subKey];
  const maxScore = 35;

  document.getElementById('resultHero').style.background = main.hero;
  document.getElementById('resTypeName').textContent = main.name;
  document.getElementById('resTypeName').style.color = main.color;
  document.getElementById('resTypeSub').textContent = main.sub;
  document.getElementById('resSubType').textContent = `あわせ持つ特性：${sub.name}`;

  let barsHtml = '';
  sorted.forEach(([key, score]) => {
    const t = TYPES[key];
    const pct = Math.round(score / maxScore * 100);
    barsHtml += `<div class="score-row">
      <span class="score-type-name">${t.name}</span>
      <div class="score-bar-wrap">
        <div class="score-bar-fill" style="width:${pct}%;background:${t.color}"></div>
      </div>
      <span class="score-val">${score}点</span>
    </div>`;
  });
  document.getElementById('scoreBars').innerHTML = barsHtml;

  document.getElementById('resMainBody').innerHTML = main.body;
  const qEl = document.getElementById('resQuestion');
  qEl.textContent = main.question;
  qEl.style.borderColor = main.color;
  qEl.style.color = main.color;

  document.getElementById('resSubBody').innerHTML = sub.body;

  showScreen('result');
  window.scrollTo(0,0);
}

function retry() {
  answers = new Array(28).fill(0);
  currentGroup = 0;
  showScreen('intro');
}
</script>
</body>
</html>
